<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Peminjaman Barang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .nav-active { background-color: #1e40af; color: white; }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Login Page -->
  <div id="loginPage" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 to-blue-700 hidden">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-blue-900">📦 PinjamBarang</h1>
        <p class="text-gray-600 mt-2">Sistem Peminjaman Barang</p>
      </div>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
          <input id="username" type="text" class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-blue-500" placeholder="admin">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input id="password" type="password" class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-blue-500" placeholder="••••••••">
        </div>
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-semibold transition">
          Masuk
        </button>
        <p class="text-center text-xs text-gray-500">Default: <strong>admin / admin123</strong></p>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="flex h-screen hidden">
    <!-- Sidebar -->
    <div class="w-64 bg-blue-900 text-white p-4 overflow-auto">
      <h1 class="text-2xl font-bold mb-8">📦 PinjamBarang</h1>
      <nav class="space-y-2">
        <a href="#" onclick="showPage('dashboard')" class="nav-active flex items-center gap-3 px-4 py-3 rounded-lg"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#" onclick="showPage('barang')" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg"><i class="fas fa-box"></i> Data Barang</a>
        <a href="#" onclick="showPage('peminjam')" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg"><i class="fas fa-users"></i> Data Peminjam</a>
        <a href="#" onclick="showPage('pinjam')" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg"><i class="fas fa-hand-holding"></i> Peminjaman</a>
        <a href="#" onclick="showPage('riwayat')" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg"><i class="fas fa-history"></i> Riwayat</a>
        <a href="#" onclick="showPage('users')" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg"><i class="fas fa-user-cog"></i> Manajemen User</a>
      </nav>
      
      <div class="mt-10 pt-6 border-t border-blue-800">
        <button onclick="showPage('profile')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg text-left">
          <i class="fas fa-user"></i> <span id="currentUser"></span>
        </button>
        <
